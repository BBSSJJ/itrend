spring:
  application:
    name: itrend-server

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:itrend}
    username: ${DB_USER:itrend}
    password: ${DB_PASSWORD:itrend}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

collector:
  api-key: ${COLLECTOR_API_KEY:dev-secret-key}
