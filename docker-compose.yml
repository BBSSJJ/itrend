services:
  postgres:
    image: postgres:16-alpine
    container_name: itrend-postgres
    environment:
      POSTGRES_DB: itrend
      POSTGRES_USER: itrend
      POSTGRES_PASSWORD: ${DB_PASSWORD:-itrend}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itrend -d itrend"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
